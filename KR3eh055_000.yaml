front:
  text: 後序溫熱瘧痢非不厲然一匙可起膈脹瘵癘非不惡然其斃有漸唯腳氣則不然寢啖如故神色依舊一朝衝心而絶者比比有之況於其誤治者乎然則病之尤可畏醫之尤可慎者孰加於此余平生於腳氣無能治愈百方研究未得其肯綮蓋古今名一而病而異和漢證齊有因不同是以處治無統衆説紛紜特吾邦山脅東門林一烏磐瀨玄策等所論述差為庶幾但其學淺薄其書鄙俚不足傳信每以為憾矣吾友了庵今村君以三世之學穎飽之才深憫世之死於斯病者夥著書以公於世其辨論若犀之燭淵若電之破暗惜不使起前數子刮目稱快也嗚呼臨至險之病施至當之治苟非能運古法而應機變出新奇而不離規矩則未易臻此域也餘風塵碌碌愛莫助之姑書所感以返之文久元年辛酉三月淺田惟常識此
