body:
  text: 卷下藥能語曰工欲善其事必先利其器器不利而善成其事者未之有也醫欲治病須先審藥性之功能而應病證之變遷病之陽投之以陰病之陰投之以陽陰不至於涸陽不至於亢方症相當則其治必矣或反之陰者死於陰陽者死於陽惡乎救焉然而神農本經說藥能不純粹諸家之說亦龐雜馳多岐焉陷邪徑焉倀倀眛眛愈讀愈迷或拘寒熱氣味或謬補瀉剛柔說是而藥非方可用而論不中斃習沉痼其害非淺也是以藥𣏾之能非取徵於張氏方中及孫王之說則不足信焉也夫治療之道以法為師以藥為器器既利法從活刃可遊也苟獲其要則數種而足苟不獲其要則百藥不能奏功藥益繁而理愈眛說益奇而術愈疏老子曰少則得多則惑醫之於藥亦然故郭履道有云藥之為用不過六十四品如易爻流傳運用不窮褚澄曰用藥如用兵善用兵徒有車之功善用藥者姜有桂之能華元化處方亦不過數種古人於藥識之精而用之簡猶能肉骨者相望於簡冊非如今之支離煩碎為用之少也挽近匪學者讀蠻土夷域之書探深山幽谷之𣏾競採異藥爭炫新奇且刳死體檢臟腑配當藥品以瑣末之學制奇怪之藥自稱為窮理顧夫理也者造化之妙形而上之物可得諸心非目可睹也則豈得言窮之不止自欺使後學守局不知處活物之機變抑可嘆矣凡人食谷續命谷不過數種飲藥治病藥亦不貴多在處方之何如耳今揭其驗於腳氣者若干種為用藥之標的庶幾乎不背張氏孫王之意焉石膏張長沙用石膏數方其症顯著無有疑惑而後人妄開竇徑陷荊棘不可不辨也白虎湯條曰表有熱里有寒又曰脈滑者里有熱也加人參湯條口服桂枝湯大汗出大煩渴又曰時時惡風大渴舌上乾燥而煩欲飲水數升又曰渴飲水口乾舌燥者加桂枝湯條曰身無寒但熱大青龍湯條曰不汗出而煩躁者又曰無少陰症者又曰溢飲者越婢湯條曰風水一身悉腫加朮湯條曰一身面目黃腫因是觀之則長沙隧伍之妙較然明晰矣白虎之為症凶焰暴瘧侵入皮膚爍熬胃中與承氣相近而其所異者系熱之聚散已大青龍者表氣壅塞緊束骨節壓迫營衛之所使是以身體疼痛無汗煩躁是麻黃之症而進一等者也越婢者水道壅閼溢滿肌肉遂為腫滿者猶流水不歸川瀆泛濫原野以為民害也據此數條則石膏之為效一則可以清熱一則可以泄汗一則可以利尿其雄戈偉勳固可以與烏喙將軍駢䮽而並騁也長沙之道不語隱怪不涉奇僻正大明實如青天白日然矣後之醫者不由正路不履實學為邪說所惑不覺墜窠臼所謂一盲引衆盲終載胥及溺哀哉人參人參之說載在歷代本草人所共知而其說曖曃不明要之不過補虛益氣之說耳豫初好使用韓産試之者數百人其中有害而無益者十居七八焉於是檢傷寒論論中用人參者二十有七方而治心下痞硬者十一治嘔吐涎沫者十一是其彰明較著者也而其量最多者木防己湯主用之者人參湯其證曰支飲喘滿心下痞堅又曰虛者即愈實者三日後發復與而不愈者去石膏加茯苓湯所謂虛者非體氣衰憊之謂也實者非體氣盛旺之謂也用木防己湯三日復發者邪熱既深也乃非用蕩刷則不能除之故曰加茯苓芒硝湯主之是人參芒硝分治心下痞硬與痞堅也古人立方可謂精微矣赤石脂禹餘糧湯條曰理中理中焦此利在下焦此為粗工被攻擊遂致下腸滑脫以故用赤石脂禹餘糧之品固澀收斂之也又曰喜唾不了了者理中丸大病差後胃中未復轉輸未健水飲停滯為痞者此湯所宜也因是觀之參之主治沖痞緩硬行水生津者可推知也乃改舊轍專用官蒔人參不經蒸焙者其味初苦後甘是蓋參之正味而試之於患者其功效與論中所舉相符桐雷二氏之論不我欺也且性力敏捷大勝於韓産聞韓人貪利之甚用糞滋之且多方極製造然則今商舶所輸皆脫真味何存排闥直入之力然而尊崇之甚比之金玉使人徒費資財耳夫自甄權始唱補虛後醫熒惑牢不可解至薛己張介賓李時珍王肯堂張石頑之輩主張其說以為續命者果然則朝饔夕飧當保數百年而不死此決無之理三尺童子猶知之矣藥者毒也以偏氣救變無病餌之其生害必矣久患長恙元氣衰憊及薄稟漸虛之人豈人參所能使壯哉越人曰攻病以毒藥養精以穀肉果菜有病服藥固可也無病則常餌穀肉省思慮節飲食慎起居遠帷幄或可以充元氣而壯弱體也余嘗意寓內之大坤輿之廣不睹人參之國必有之而患者未必皆死則雖無此物亦不為闕事也陶隱居曰人參與甘草同效孫思邈曰無人參以茯苓代之據二子之言則參亦一裨將豈有統帥之戈乎故曰小寇可拒大敵非其所當是誠知參者可謂獲我心矣金元已降延命長壽之說盛行於世而蔓延於我邦乃今有病之家每遇危篤不問可否必餌之醫亦容悅用之塞責終至於使正氣日蹙自招其死不亦痛歟嗚呼苟志於濟生者忍乎為之司命之職宜猛省焉地黃古方所用生與干已其稱熟者亦不過於用酒灌焙而後世九蒸九暴以酒氣損其性是出於庸醫過鑿既失真味豈中於用乎此物春生苗其葉毛茸皺文似車前草而無光澤花如胡麻其色有黃紅紫之別黃者為真大抵莖長數寸連皮肉皆黃根發黃色則結實形如小麥粒質重實投水即沉為黑色者系腐敗耳凡草木堪寒氣者其性屬寒而地黃則怯寒遇霜即死故種者用稿裹里之置火於其上取暖俟春由是觀之神農經及本草言性寒者不足信也味甘質潤經久不幹其能滲入血中養血液營運行夫血液虧乏按脈無力者系虛候也其脈細數者為瀕死之候非地黃之力不能挽回矣案莖葉毛皺無澤者蓋以其氣專鍾於根蒂也故雖滋潤澀而不滑能治吐血衄血下血且調婦人産後亡血以其滋血液導運行也芎歸膠艾湯可以見其效能婦人在草蓐發露得風四肢苦煩宜三物湯者以君地黃臣苦辛黃芩解其煩也虛勞腰痛少腹拘急小便不利者宜八味丸轉胞亦用八味丸以地黃滋潤利血中水氣也又治腳氣入腹小腹頑痹痛癢不覺短氣有微飲當從小便去則苓桂朮甘湯主之而兼用八味丸要之血水同道而並行故主地黃伍茯苓澤瀉之滲利男子消渴亦以此治之是仲景氏妙手段也錢仲陽八味丸中去桂附稱六味丸以療小兒夫小兒血氣未厚故脈多疾數乃用地黃丸其治五遲五軟等證其方雖失古意可謂能知地黃之能者矣薛己始唱補虛益精之說後醫信其妄不惟舉之於口又筆之於書遂使此草藥為恣欲誨淫之媒何其冤乎大黃神農經曰大黃味苦寒無毒蕩滌腸胃推陳致新夫蕩滌腸胃者大黃之所主而推陳致新者人身之天機也喻如竹木刺入肉知痛者神氣而非皮肉也所傷生膿則自拔是天機爾乃助天機者一切治療之要紐也大黃能入腸胃掃除諸惡液是所以逐癥瘕留飲宿食諸邪氣自大便下之其性膩速滲透血中以故服之小便帶黃色大便從瀉下配之乎枳實利甚急合之乎甘草利較緩所以大承氣與調胃承氣有差別也合黃連黃柏梔子等則瀉心胸清瘀熱配水蛭虻蟲桃仁等則下瘀血與甘遂則瀉水氣明醫録云治女子寒血閉脹小腹痛諸老血留血誠然矣其治諸瘡瘍亦以有解毒之能也用之泄瀉下利解熱逐毒毒盡則自止治食已即吐者及痢病後重並以疏滌惡液健運腸胃也可謂藥中之將軍矣附子天雄烏頭附子側子漏籃子詳於本草綱目而其種本一物因年曆多少異名焉耳而仲景氏獨用烏附者蓋取力之優者猶如芋魁於側子也余少時漬附子於水減其鹽經宿洗之手指觸毒熱痛後洗土芝指甚癢已於是悟附子辛熱自毛孔滲入發痛而土芝蘞氣自汗孔滲徹發癢二物固並有毒然附子則宿根所生經寒暑而成故其毒猛烈土芝則春種秋熟其質軟脆不堪寒暑且系食料故毒亦從薄功能之別可推知矣烏附氣味雄悍驅寒冷補衰弱開達表氣以溫百體乃服之過度必生瞑眩至其甚脈絶大吐水是與縱飲之人不堪酒氣剽悍發嘔吐同一理仲景氏附子去桂加朮湯條曰一服覺身痹三服都盡其人如冒狀又烏頭桂枝湯條曰如醉狀皆言其暝眩之狀所謂藥不瞑眩厥疾不瘳是也然其氣猛悍難施之於元氣衰漓之人不可不戒者也大凡腸胃生寒而血液敗則藏府為之拘攣掣痛或繞臍而痛或腹中絞痛或雷鳴切痛或手足厥冷其治舉屬於烏頭大烏頭煎條曰治寒疝繞臍痛脈沉眩者烏頭桂枝湯條曰寒疝腹中痛逆冷附子粳米湯條曰腹中寒氣雷鳴切痛案陽氣壅塞則身體鬱滯生敗液經脈為之乖戾從其毒之所在而發痛是痛風腳氣之因發浮腫亦屬烏附主治故烏頭湯曰風濕相搏身體疼痛不能轉側是用烏附除敗液豁滯氣也又發汗病不解反惡寒者其人虛也芍藥甘草湯主之發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之是並亡陽之症非附子不能治也陽窮生陰人天一理乃漸甚則玄武四逆白通等隨症投之但人身虛實不同寒熱異途而邪氣亦不一則或直見少陰症麻黃附子細辛湯麻黃附子甘草湯附子湯玄武湯此皆附子所主治也脈沉沉小沉微沉緊浮而澀是皆系寒冷所致人為寒氣所襲血氣不和運行從阻譬如魚肉汁遇寒凝結非附子辛熱何以得溶解之哉傷寒金匱所載藥方二百有餘而烏頭附子配合者二十九烏附功能居多可知矣夫切於人身者無如水火而其為害者亦無如水火火者熱也水者寒也乃治熱用寒藥治寒用熱藥是固理所然雖然術存乎其人果得奏效豈易易也哉牛膝此物有脂膩之氣滲徹血中清淨瘀液開散鬱塞疏通水道神農經曰主寒溫痿痹四肢拘攣不可屈伸蓋此品雖有養血營筋之力非以之治四肢拘攣膝痛也嘗試之為拘攣踡曲者以關節含廢液滯血也醫苟不達此理則藥屬徒用且此物能引諸藥下行乃腰腿之疾不可缺之品也術逐水止瀉熯濕除痰術之用得桂枝附子則治小便自利得麻黃石膏則治面目黃腫小便不利配桂枝人參則治利下不止在真武湯治四肢沉重疼痛在茯桂術甘湯治心下有痰飲古唯謂術無蒼白之別陶氏方分兩種自宋以來始言蒼者苦辛氣烈白者苦甘氣和自此世人多貴白賤蒼蓋蘇頌作之俑也今試之性功不甚相遠其質多脂且氣烈故能滲透血肉宣通水道此為滲利之專劑矣豬苓澤瀉亦疏通之品因隊伍各異其使用宜類推取驗矣芍藥傷寒論中用芍藥十八方主腹痛者七方主體痛者八方腹痛頭痛身體不仁腳攣急皆系筋絡拘急而芍藥之功居多且用之廣合術苓則逐水氣合藭歸則走血脈合桂枝則開腠理其他效用極博故經驗方用之於風毒骨痛事林廣記用之於腳氣腫痛古今録驗用之於衄血咯血聖惠方用之於血崩帶下詳載愚著藥能考今不復贅焉薏苡仁神農經曰治筋急拘攣不可屈伸筋急拘攣者系風濕痹乃仲景氏治風濕相搏身體疼痛者用麻黃杏仁薏苡甘草湯可以知其然矣此方去薏苡加石膏治喘急古人立方之意不忽諸也薏苡附子湯治胸痹緩急而敗醬散則於此方中加敗醬以治腸內癰腫馬援在交趾時餌薏苡仁言輕身資欲又勝瘴氣其避濕邪可心徵焉橘皮呂氏春秋曰果之美者江浦之橘雲夢之柚是則名産取對耳孔安國禹貢注小者為橘大者為柚神農經曰主治胸中瘕熱逆氣利水穀按橘橙柚柑拘櫞之屬性功相似時珍說其功甚精細然不足盡信也往初垂仁帝命田道間守求非時香於海外按寒天萬果皆墜然橘獨存非時之名蓋取之於此又聖武帝時播摩直弟兄始齎甘子自唐歸甘子即柑今則所在繁殖其皮不乏藥用青陳之別因採時老嫩耳非二物也其功能開胃驅痰和中焦故仲景氏伍之大黃芒硝湯治胸間宿滯如橘皮竹茹湯則專主橘皮治噦逆芳芬之氣開豁肺胃也厚朴張元素曰厚朴之用有三平胃一也去腹脹二也孕婦忌之三也試之二者果如其言在孕婦不必然也按是見承氣湯中有枳朴便謂枳朴大泄元氣甚可恐是所以為是說吠聲之徒不察概為瀉泄之物而不知其辛溫提滯氣治腹脹也平脾胃者健運營也以故仲景氏大小承氣湯厚朴七物湯配之於大黃以蕩滌腸胃後世平胃散伍之於蒼朮橘皮以主消導非專主瀉也防己防己別漢術而為二種者出於後世外臺云漢中木防己出漢中為上好蘇頌曰折其莖一頭吹之氣從中貫如木通然因知其功透胸間腸胃達四肢開閉塞泌水氣實利水之仙藥無可代之者故用木防己湯治膈間支飲其為喘為痞者皆因水氣也防己茯苓湯治四肢為腫者祛水氣也他如防己黃耆湯治身重己椒歷黃丸利腸間水要與木通滲泄之劑同焉枳實按枳即橘柚之屬也故其形狀似橘其葉似橙多刺周禮云橘逾淮而北為枳是也時珍不辨之別載於灌木條者誤矣七八月採者稱枳實八十月採者呼枳谷寇宗奭曰枳實枳殼一物也小則性酷而功速大則性詳而功緩宋開寶本草始出枳殼條香川太仲非之謂不解殼實字義但唐人詩處處春風枳殼花採盡高山枳殼花然則殼實二字古不必差別後世實殼分為二乃說主治亦異途可謂泥矣此方出薩州者臭橘而非真枳也凡橘柚柑枳之類皆有刺棘而枳最多因知其性直入腸胃沖蕩滯畜之汗物資食物消化之機故古人譬之於沖牆倒壁可謂善喻矣仲景氏治心下堅大如盤邊如旋杯用枳朮湯蓋此證胃中瘀液滯瀦之所為乃枳實術俱戮力衝破結實使之疏通四逆散亦配合枳芍以治胸脅苦滿心下痞塞腹痛泄利産後腹痛煩滿不得臥者用枳實芍藥散是配酸味收斂之𣏾以消導瘀血也如排膿散亦然大黃枳實合力則蕩滌腸胃最猛烈是以大小承氣大柴胡湯皆並用之調胃承氣湯除枳實用芒硝加甘草以主緩綏因此觀之則破結塞消脹滿逐停水止下重者皆取功於枳也茯苓氣味甘淡性澀澀帶脂氣故滲入血肉澀澀水氣聚之輸送尿道通利小便是以仲景氏用之於茯苓四逆湯治汗下後之煩躁又用之於真武湯治心下悸頭眩身瞤動筋惕肉瞤之症若衝脈激動而為悸者則桂枝甘草湯所主治也桂枝條可並見焉小便不利厥而心下悸者茯苓甘草湯所主也葵子茯苓散主頭眩小便不利茯苓桂枝白朮甘草湯主心下逆滿頭眩二方俱水氣之所為茯苓滲濕之功可推知矣麻黃此物纖細徑直外黃內赤中空有節如竹形宛似毛孔故有疏通之功因知其氣入腸胃透徹血脈遂達肌表發越閉塞令邪從汗出焉又至肌表怯弱汗自出者則還收斂其汗是資表陽之氣使之適宜也外感之邪猛悍剽疾壅塞表氣直逼於骨節為身體疼痛逼於肺為喘為咳用麻黃湯發泄郁陽則疼痛咳喘爽然而痊麻黃湯症而壅塞尤劇者為大青龍湯症治無汗煩躁本方加麻黃六兩石膏雞子大其峻烈可推知矣桂枝麻黃各半湯桂枝二越婢一湯桂枝二麻黃一湯並系纏滯之邪小青龍湯之兼飲麻杏甘石湯之兼喘葛根湯之兼項背強急此屬太陽病之治例也踡臥惡寒脈沉小者麻黃附子並用以鼓舞表陽是為麻黃附子細辛湯麻黃附子甘草湯之症此屬少陰病之治例也蓋汗之與尿俱津液所化故麻石同合則驅水越婢湯文蛤湯厚朴麻黃湯可以見焉麻桂同配則逐汗小青龍湯葛根湯麻黃加朮湯桂芍知母湯可以證焉蓋仲景氏用麻黃之法雖有數方大率無出此範圍擴充而運用之則病之宜發汗又宜利水皆不得不取法於此矣或曰木賊燈心草接續草等皆中空而仲景氏何獨用麻黃曰木賊外皮糙澀不滑燈心內有白穰並少透徹之力接續輕浮固不堪藥用也古來說麻黃之功者曰治衛實無汗又曰肺經專藥後人因更為說附會不足取豫經驗似有所得是所以與昔人之解不同也又案仲景氏煎法曰先煮麻黃去上沫內諸藥陶弘景曰沫使人煩陶說恐非也豫當觀世之搗紅花制胭脂初則色淡去滓之後見濃紅麻黃去沫正與之同去上沫得純精所以逞其功也葛根亦同瓜蔞根水飛以為天花粉則極有功牡蠣亦燒之治敗液其他經制而見功者多不可不知也木瓜爾雅曰楙者木瓜也郭璞注木實如小瓜味酢可食二月花紅色其實小而似瓜故謂之木瓜味極酸故滲入血肉中收斂血液絞出津液弛筋脈牽縮故晉唐方書多用之於腳氣又治轉筋疝亦縮腳筋故用之見功又治霍亂煩渴陶隱居曰木瓜最療轉筋如轉筋時但呼其名及書上作木瓜字皆愈按呼名作字理所可疑然呼青梅口生津人心感物此理不可謂必無矣雷斆曰凡使木瓜勿犯鐵器以銅刀削用凡藥有專長有專忌亦不可不知者也吳茱萸茱萸有三種藥用者以其出吳地故冠吳字其味辛溫神農經曰溫中下氣仲景氏用吳茱萸湯治吐利厥逆又治嘔而胸滿者及乾嘔涎沫頭痛者是其氣質之力豁胸膈止嘔吐溫胃中治煩亂孫真人半夏湯之外皆用之於疝氣風氣腳氣衝心者取辛溫推下之能也沉香沉香楊億談苑范成大桂海志張郎正倦遊録等辨之甚精但就薰香而隲之耳至服用之功置不論焉按此物生蕃國本草所載亦不能無疑矣其伍藥方者蓋昉千金五香湯歷代運用極廣矣豫試之患者降氣祛痰開豁閉塞其質堅硬鎮墜香氣芬芳所致也且治水腫療喘急檢之取少許投水其沉者為良沉香之名可謂一言蔽之也檳榔子質堅硬味澀而苦辛治水毒逆搶心下者與鐵石之沉重能墜諸液至於下者正同焉分泌水血通大小便是以消穀逐水除痰去癖者如本草所載且治水腫積聚止痢之後重又能下蟲截瘧其他功能見於古人經驗中羅氏寉林玉露云嶺南人以檳榔代茶御瘴朱晦庵檳榔詩云撾病收殊效修真録異功亦足以證其能焉大腹皮時珍曰大腹皮與檳榔同功又曰大腹皮檳榔子皮也今碎視之總有筋絲蓋其線質滲入血肉開泄閉塞驅逐水氣故局方五皮湯泄膜外之水入門大腹皮湯亦能逐水氣治腳氣伍紫蘇和氣飲為産前通治之方且療惡阻胎動時珍曰健脾開胃消肌膚中水氣浮腫是也牽牛子氣味辛辣逐水利氣用之少則動大便多則瀉下劉守真張子和之徒專表其功能至今為通用下藥蒞用碎之配他藥者恐氣脫也或言其色黑者屬水而破血中之氣白者屬金而瀉氣分濕熱是附會之說不足辨也半夏性辛溫有蘞氣能消頑痰止嘔吐治咳逆利咽喉按飲食過度留滯胃中漸成積聚胃不能堪任鬱結為黏痰為敗液而噁心嘔吐併發半夏能散結聚以輸停水瀉出敗液嘔吐從止故仲景氏大小半夏湯半夏乾薑湯專治嘔吐附子粳米湯及半夏瀉心湯皆伍半夏治嘔吐下利其功可以見如半夏苦酒湯蓋屬外襯亦半夏之一活用也蘇古昔單稱蘇後世有白蘇故加紫字別之猶陶氏辨術之蒼白其紫色者氣極香味辛溫略類桂有行氣利膈之功故仲景氏配半夏厚朴湯治咽中如有炙臠後世伍香蘇散參蘇飲治感冒微邪又配正氣天香湯蘇人湯開散愁郁又伍紫蘇和氣飲治産前諸患其辛溫芳香開排閉塞發揚表氣是以三和散之治疝氣正氣散之逐風邪檳蘇散之療腳氣蘇子降氣湯之下氣除喘鳴消痰飲之類極見奇驗揚雖輕浮豈可棄之哉採葑之詠可以推焉桂枝凡愛好香而嫌惡臭者情之所然也嗅之快則飲之亦快理之所然也是知桂枝氣味芳烈辛溫其香鼓舞精神助衰微運營衛故傷寒論中發汗過多其人叉手自冒心心下悸欲得按者用桂枝甘草湯又發汗後臍下悸者欲作奔豚者苓桂甘棗湯主之按其悸雖異心臍其源一耳何則人身中有一大幹在於腹底潛伏運行以掌心血下行內經謂之衝脈難經謂之腎間動脈為發汗所激生悸但在心下者與桂枝甘草湯在臍下者與苓桂甘棗湯是仲景微旨也其悸惕惕然跳動者精神之衰弱已其劇者曰奔豚氣桂枝加桂湯所之也桂枝善爽精神順血運行故鎮動氣傷寒金匱中諸方多出於桂枝湯變方桂枝者可謂衆藥之長矣犀角犀有三種山犀為上品時珍曰角者精靈之所聚也胃為水穀之海飲食藥物必先受之故犀角能解諸毒能療諸血及驚狂斑痘之證按時珍解毒之說原於金匱犀角湯療血之解據千金犀角地黃湯今試之其功涼血熱而旁利水毒是以犀角地黃湯治諸血妄行醫學綱目犀角湯治傷寒伏熱在心怔沖驚悸不得眠者千金月令崔氏旋覆花湯延年茯苓飲等治腳氣皆用之以理血分豁胸膈通小水也甘遂舶來為佳味辛烈性剽悍泄水之聖藥也凡水毒結胸中非此不能破之其氣直透所結處故攻決為用十棗湯大陷胸湯甘遂半夏湯大黃甘遂湯湊合之妙可心觀矣但其有毒不可輕用凡駃藥除病其功速然有弊如甘遂之煩桃花之渴營實之下重是也王璆百一選方用甘遂治腳氣上攻者是亦可以備一時之需猶戒之於脾胃虛羸之人大戟味辛烈入腸胃逐水氣淮南子繆稱訓曰大戟去水葶藶愈脹用之不節反為病宜臨症斟酌矣芎藭字典營香草又作芎引本經注云人頭穹窿高天之象此藥上引專治頭痛諸疾故號芎藭仲景方中雖無治頭痛之文此物氣味芳烈而脂質因推其理能入血分順血行開氣鬱案古方大抵芎歸併用伍當歸芍藥散治腹中急痛合膠艾湯治漏下其單用者為酸棗仁湯白朮散一曰虛煩不得眠儱酸棗仁治血液枯燥不能眠一曰心下毒痛倍加芎藭乃知藭不特調血分又有破氣止痛之功奔豚氣用芎亦不外於此義又案歸甘平主和柔芎辛溫主排散猶仁與義相依而全其德也香川太仲以氣味論優劣恐不當矣木香産於蕃不能詳其形狀味苦辛氣芳烈因知溫暖脾胃鼓蕩神機開氣鬱散血滯故用之霍亂嘔瀉痢疾裡急後重及積聚血痛要以香竄之氣逞宣通之功也與沉香俱屬氣劑同途異轍薑黃李時珍曰薑黃鬱金蒁藥三物形狀功用皆相近古方五痹湯用薑黃治風寒濕痹手臂痛戴氏要訣云入手臂治痛香附子李時珍曰此乃近時日用要藥而陶氏不識諸注亦略乃知古今藥物興廢互有則本草諸藥亦不可以今之不識便廢棄之遂至為之說曰氣病之總司女科之主帥愚嘗熟檢此物葉如老韭而硬如劍背有稜根大如羊棗而兩頭尖是知此草備功能於形狀入胃中助消化之機透血分祛汙濁之液開愁郁舒氣血使運動得其宜小便通月水調故配之香砂平胃散治食傷資消化主沉香降氣湯開壅滯順升降又用之腳氣衝心方後云常服則開胃消痰散壅思食時珍盛舉候沙之功旁引精密然皆他物之功而非本分之所有也縮砂縮砂白豆蔻益智草果大抵形狀相似性功亦相似但各有專長果之於瘧蔻之於醒縮益之健脾胃散鬱塞蓋皆取乎其芳香氣烈之性世有用伊豆縮砂者此物系高良薑實以其名紅豆蔻遂混用謬人宜辨別烏藥烏藥辛溫香竄能散諸氣溫冷痛伍烏藥順氣散則治半身不遂配四磨湯開七情鬱結合烏沉湯祛一切滯氣曾聞享保中囑商帆齎天台烏藥種之於諸州熊野山最繁殖土人窄油為燈火充之藥料芳氣淡薄不中用蓋地氣令然也郁李仁爾雅所稱棠棣即是碎核取仁味微酸本草曰主治大腹水腫面目浮腫愚數試之蓋似收斂血液而輸之尿道者利水之功殊優於諸藥若過量則瀉下獨活本經曰獨活一名羌活以出羌地為上品坊間宿根為獨活新根呼羌活蓋舊者其氣薄新者其氣烈生切浸水則脂浮水面瞥瞥然其莖葉有毛茸可知其質含脂膏故透徹關節止疼痛資陽氣配之三和散治疝氣合羌活導滯湯治腳氣君沉香天麻湯治癇症儱小品葛根湯治子癇是皆由隊伍之功又入膀胱則利小便入子宮則除汙濁用時宜選舶來上好邦産力稍劣桑白皮其功滲入肺中治咳嗽喘滿又治水氣填體中發喘滿者陶氏所謂利水道也外臺崔氏治腳氣遍身腫滿方君桑根聖濟桑白皮湯治痢後身腫脹滿頗有驗杏仁李杲曰散結潤燥此說得之思夫無脂膩不能潤燥無尖質不能散結合桂枝則透徹汗管開毛竅能發汗伍麻黃石膏則滲入肺中治喘急息迫又能驅停飲消腫氣配薏苡則治風濕並麻仁則潤燥本經曰主咳逆上氣雷鳴蓋今之哮喘柴胡人皆知石膏大黃附子之多功用而不知柴胡亦然也蓋柴胡之用徵諸先哲配合之旨則主治邪滯於胸脅而熱為往來者聖惠聖濟用之於腳氣治心胸滿悶楊仁齊用之於血熱薛鎧用之於鎮肝東垣取之升提聖濟合之虛熱其功甚博他如補中益氣湯及逍遙散之類升發精氣開豁鬱塞皆不離小柴胡湯之旨世醫或安其平穩不問得失濫用謬誤不可不審焉也黃耆耆之功大端有二矣一則逐表濕黃耆桂枝五物湯烏頭湯耆芍桂酒湯桂枝加黃耆湯皆能祛濡滯之邪陶氏所謂風水家要藥是也一則托內虛黃耆建中湯治裡虛張元素所謂壯脾胃補諸虛是也蓋此物健血液之運行資水道之通利此其所專長也故能治為痹為腫為黃汗為歷節疼痛為衛虛漏汗者然其性和緩非配燥熱之品則不能奏效故得桂朮附酒之嚮導而逞運行之力長沙配合之微旨可察焉矣因隊伍各異其能非一味兼衆功顧在於用之如何耳後世不達此意裒合柴胡升麻逢虛人必用黃耆專於補虛所以久服必生偏勝之害也鐵本經載金石之功多涉於方士服食致長生之說至藥能則略焉不能徵之於此按鐵之為物頑塊剛戾無味又無臭氣素問始說治狂疾驚癇之功歷世遵用其功顯然豫嘗用之乎腳氣及水腫頗策偉勳蓋其性鎮墜功屬收斂故能入血脈泌別水氣鎮動悸降上攻又有資運行之功又助飲食消化之機凡藏府及諸産縱緩萎衰而發水腫脹滿者為之要藥但用之者非得肯綮而執樞機不能著其功詳之於藥能考不復贅焉旋覆花仲景治心下痞硬噫氣不除用旋覆代赭石湯治婦人用旋覆湯胡洽治痰飲在兩脅脹滿用旋覆花丸皆取驅飲甄權曰主水腫逐大腹開胃止嘔逆不誣也羚羊角此物邦産雖與漢産少異形狀性功則同先輩既辨之本經逢原曰諸角皆能入肝散血解毒而犀角為之首蓋以精鋭之氣破鬱結之毒故用之鎮癇又用之眼疾又用之利水飲觀其隊伍可知其功能焉或云所舶之羚羊角者山驢之角也本草云其角長尺余有節特起環繞如人手指握痕得二十四節者尤有神力今所見即此物蓋非山驢也巴豆其性辛熱大毒擾亂腸胃蕩滌水穀走馬湯白散備急丸紫丸之屬藥陳中無有爭鋒者乃大用之則有斬關奪門之功少用之則有撫綏調中之妙以故消堅摩積通腸泄水不可一日無者然用之於腳氣服後枯渴津液耗疲天真變症轉生快藥之害不可不畏而戒也古人以醫術比軍術誠然矣病者敵也不可不攻而病勢有強弱病候有虛實或合或並或緩或急其症多端乃應證處方猶臨敵設謀辨性用藥猶命將攻敵大黃附子巴豆石膏則其性雄猛絶倫即戡亂之將也如漢高用韓彭而功可取矣否則不止不能成功或為大害矣陳皮茯苓紫蘇黑豆則其性平淡不過督卒伍充防禦之役然將卒相待君臣相資可以奏其全功卒豈可闕焉哉要之善用將則敵可陷善用藥則病可治且藥石之於病有單捷奏功者有參伍成功者有衆味戮力致功績者是亦所謂知彼知我而可戰也醫人非知病知藥安得奏捷摧陷廓清策功於千載其可不期乎哉
