body:
  text: 卷上總論腳氣之病創見於宋齊梁隋之世而諸家所論或為風毒或為濕痹或緩風或腳氣或厥或瘟詳其治法者雖莫孫王二氏如焉猶無有定論矣所謂千方易得一效難求得其要則一方可治百病不得其要則百方不可治一病雖多亦何益蓋此病者一種之水毒地氣所生而非風寒暑濕所幹涉其發必始於夏終於秋希有涉冬矣豫嘗謂暑月陽氣泄外伏陰在內運輸不健水道不利之所致而原其所由則有從外因而來者有從內因而致者有與諸病併發者驗之於患者大抵由內因者十之八九由外因者十之二三與諸病併發者十之五六夫王侯貴官出則肥馬華轎入則高堂大廈未嘗履地其多患此病者無他膏腴過分酒食越度因以致之是生於內因者也田夫奴隸負重涉遠冒雨蹈淖坐臥濕地而得之是發於外因者也傷寒中風鼓脹瘧痢寒疝黴毒娩産之後皆嬰此患是與諸病併發者也然而症有緩急質有堅脆不可執一而論焉浮腫見於外者比之於不見者其毒較輕千金方曰腳不得一向以腫為候亦有腫者有不腫者其小腹頑痹不仁者腳多不腫三五日令人嘔吐者名腳氣入心死在旦夕水毒發於外者尚延日然至衝心則無異矣又曰食飲嬉戲氣力如故唯卒起腳屈弱不能動又曰腳氣未覺異而頭項臂膊已有所苦有諸處皆悉未知而心腹五內已有所困風毒之中人也或見食嘔吐憎聞食臭或有腹痛下利或大小便祕澀不通或胸中衝悸不欲見光明或身體冷疼煩發班蚊跡以此相貌須認陰陽經來路又曰精神昏憒或喜迷妄語言錯亂或壯熱頭痛或身體酷冷疼煩或覺轉筋或腳脛腫或不腫或䏶腿頑痹或緩縱不隨或百節攣急或小腹不仁此皆腳氣狀貌也又曰風毒腳氣之候也其候難知當須細意察之不爾必失其機要一朝病成難可以理以豫視之是徒論派症而似遺源本雖症有數候其要在於呼吸小便之何如耳呼吸促迫則毒侵心之兆小便赤澀則毒蓄之內而漸加之自汗嘔吐肩息氣逆其死不旋踵矣內經曰治病求於本又曰治之極於一余家治之以利水為急夫人之水氣滲出腸胃留瀦膀胱下出為溺此其常也今患者失常欲利所畜之水氣自非嚴禁鹽味猛制膏粱服藥無效矣腸胃分泌水穀譬如漉濁水桶底穿穴從宜納砂乎其中則水瀝瀝而出若使砂盛滿則水道壅塞而不出是同一理不禁鹽膏則猶納砂盛滿矣乃治此病初不問其由嚴禁滋味鹽氣使之啖紅豆碎麥乃淡薄之品而後對症施治取效極易是舍其見症而極於一求於本之典訓也症重者固勿論雖輕者菲飲食戒帷房節行步慎喜怒而灸腰腳是其大較也楊大受曰腳氣壅疾也用宣通之劑王德膚曰無補法有利性勿漫用補藥是醫之大禁二子者可謂有所見然猶未為得深詣凡用峻藥行瀉下病勢雖摧元氣從損元氣從損則雖病不增進而溘然遂至死者比比有焉此皆駛藥攻伐所使然也許仁則論乾溼蘇長史五種王宇泰屬肺張戴人吐法羅天益地勢張景嶽內外因之說各不無自出機杼發揮妙理者然長短得失互有之要不過於欲炫己說誇張偏見耳聖惠聖濟頗勝於諸子而亦拘泥繁瑣後世醫人眩惑名義而不尋討本源徒因襲踐跡不通活法抑可嘆矣原因腳氣之為恙系水毒之所為其毒剽悍猛烈外之則𤸷痹不仁內之則嘔吐衝心侵入血隧壅塞水道斃人於數日之間其猛可畏矣蓋水性潤下濕就於卑自然之理也故支法存仰道人輩見其自下起而上衝心胸遂下腳氣之名焉蓋永嘉喪亂公卿徒跣跋涉侵江南之蒸氣不習水土飲食亦異脆弱之質為腳弱為腫滿比比相斃支仰之徒留心經方偏善治術晉室仕望多獲全濟不唯功於當時令後人倚賴孫氏亦有瘴毒之說蓋嶺南瘴煙卑濕之地炎蒸毒霧不可行感之則病此不過表其所起之地今不限南北不分都鄙所在皆行則不止地氣卑濕瘴炎毒霧所致而人身所自招可知矣余漫遊諸州熟視此病江戶最多京師浪華次之僻陬地方希見是似病從都鄙為之差而其實則出於都人飽升平之澤而遊惰縱欲焉貴人固也下至賈豎輕暖薰身雉膏染唇倦於淫樂困乎過飲精神為之虛形體為之萎釀一種之水毒於陽氣外泄之間此其本源也故嘔吐腫滿衝心氣逆其候可以推其毒矣乃觀其斃者非死於腳氣而死於水毒瘳亦非腳氣之愈而生於水毒之除使毒遏住於腳部而不奔騰於心胸則豈見暴死之患哉蓋水毒者本而腳氣者標也為醫者通此理而救之則守禦馳驅之策可運諸掌上矣腫滿毒見於外者其病屬輕然水氣充於內而溢於外則亦有暴速之變所謂濕腳氣是也須預慮焉矣其毒莫不內外貫通表裡環會與水腫病之引日彌月者迥異焉治方仿治水之例非所及也泛然事利水腫雖消毒仍滯遂有衝突丹府之變比比所目擊也拘泥水腫而不審水毒之因何如決流或決之津液枯涸不能回生也鑑之之要在於胸動呼吸小便此三者須細察之古人事於內者顧外專於外者顧內不辨之於始症輕者亦難復湯醫審此治之如禹之行水莫有不救者矣麻痹水毒有壅塞表氣使血氣不宣通者謂之麻痹所謂乾腳氣是也至其甚者搔皮膚如隔衣謂之不仁有機關緩縱筋絡弛解不能收攝者謂之嚲曳又血氣相搏疼痛者屈弱不能起者轉筋攣急者雖證候有等並系水毒所為今驗之患者腳弱而麻痹強者多不為腫小便不利者雖發腫氣無有及周身足脛大腫者麻痹及少腹少麻痹強者腫氣必少其脈滯緩皮膚枯瘦者亦屬輕症脈沉而實者則水道閉塞而其腫填滿一身是其初起辨痹與腫之大較也又有麻痹漸逆入少腹過膻中迫心肺者其脈必數急動氣奔騰嘔吐不止呼吸短息肩息煩悶是衝心之兆死在旦夕不可一刻失治也候脈脈者醫門之法律淺深緩急系焉安危存亡判焉不可不最詳也夫血之在於心臟出者為經入者為絡人身中血氣所注經脈所輸外則皮毛肌肉內則藏府關節凡腠理之所通會猶張網羅會合環回上下來往自有生之初至衰老之終晝夜運行無有間斷神氣雖睡血氣無睡是肺藏開闔之機所然也乃人身有病則經脈不順利或沸騰或凝泣或緩或急或實或虛必徵諸脈行而知焉古來診脈者專於薄肉處候之曰三部曰扶陽曰人迎按方寸之地切微末之動而決生死者似近誣然古人往往百不失一何也人之所以生因飲食其要以胃氣為本也素問云平人之常氣稟於胃胃者人之常氣也人無胃氣曰逆逆者死蓋脈者血之體而氣之用也活潑流動得中土之精英得者生失者死故氣之盛者血行疾而脈強大氣之衰者血行遲而脈弱小是故生機熄則脈亦絶矣是所以胃為原也中藏經曰腳氣之病傳於心腎則十死不治入心則恍惚忘謬嘔吐食不入眠不安口眼不定左手寸脈乍大乍小乍有乍無者是也入腎則腰腳俱腫小便不通呻吟不絶目額皆見黑色氣時上衝胸腹而喘其左右尺中脈絶者是也又千金舉三品之脈曰病人脈浮大而緊駃此是三品之最惡脈或沉細而駃者此脈正與浮大緊者同是惡脈浮大者病在外沉細者病在內治亦不異當消息以意耳外臺引蘇長史曰腳氣脈三種以緩脈為輕沉緊為次洪數者為下自三十年凡見得此病者數百脈沉緊多死洪數者並生緩者不療自差余亦屢驗之腳氣不論乾溼緩為吉急為凶短促為險沉伏為死須量人之少長肥瘠與病之緩急劇易而救療之至生死存亡之機應手得心不可筆以傳不可言以說存之於其人候膻中人身中莫不有動氣而動氣亦察病之一端獨於腳氣動氣之候居重矣夫心與肺互相應心以出納血脈肺以橐籥呼吸俱系至貴之地水毒沖之生機即絶矣膻中者經血二脈之大幹出自心藏而達周身之本乃候膻中者察血之本也診手足者候血之標也標本相照源委互參決死生判劇易莫切於此矣夫水毒潛匿心胸阻閡血隧則血往而無所還逆行而逼心值此之際動跳築築然見於膻中譬猶奔泉之激石洪流之觸洲水怒浪翻所以水之迫心胸可徵矣又方其初起有忽然見跳動者是尤急候其禍不可測又雖有短息嘔吐心胸煩悶等惡候悉備焉而膻中無動者必無衝心之虞宜甄別之而決死生於其初矣診法水毒之發衝心者為必死矣不論腫不腫也而衝心之驗醫非逆察而處之則何得救譬陰雲密布而雨漸來人預知之晴天忽變風雨驟至非候天氣者不能預察之察衝心之候專在動氣動氣得於手而應於心則死生判於一診是我門之真訣動築自膻中上雲門騰驤有勢而氣息促迫者其死不旋踵小便短少煩渴滿悶者水毒伏於丙之候遂至衝心心下暴悶氣逆嘔吐不止者危候言語聲氣不足者凶候項頸或手足或胸間突然發腫氣者可甚怖之候腫氣不滿周身而聚於一偏者為水毒凝結衝心之候小便赤澀大便溏泄者屬不治服利水劑小便雖通腫滿不減者亦不治指頭及口鼻氣冷者死候腫氣堅者難治軟者易治堅者肉間之水也軟者皮下之水也是診法之大較如其蘊奧則不易縷述焉治法病因有三道如前所說鬚子細尋來路自外因者宜發泄表氣之劑自內因者宜開泄壅滯之劑與諸病併發者宜隨證之主客而斟酌療之是其大概也來路雖異末節一歸於奔騰小便祕澀者胃元失權也宜從事淡滲下脘衰憊者專從滋補水毒不泄勢必衝突宜瓜茱檳朴之類至煩悶嘔吐上氣衝心則非靈鐵鎮墜之方不能奏偉勳於頃刻之間楊大受云腳氣之疾自古尚疏下為壅疾故也然不可太過太過則損脾胃使運營之氣不能上行反下注為腳弱又不可不及不及則使壅氣不能消散要之體質之強弱病勢之劇易水毒之寬猛尤宜甄別而施治不明此理而求速效則補其所不當補攻其所不當攻參差錯亂不能奏效故雖良方用之不中則反致害甄別之診其可忽哉古謂藥不貴執方而貴合宜方即兵家之法略匠氏之規矩也法可以授人而不能使之必取勝矩可以授人而不能使之必取巧運用之妙存於其人矣補瀉補瀉者治療之大綱死生之所繫最不可苟且鹵莽也蓋腳氣之為恙系精虛邪實之症瀉之則速死補之則促命二者不可行之其故何蓋水毒不在腸胃在於膜外而混淆血脈環回百體終上騰於心肺其候為胸脅滿悶下氣喘急嘔吐中心若誤下之一旦雖減其勢反激生卒然不測之變治之惟當以漸分泌水毒輸之尿道其意與水腫忌下藥正同夫尿者膀胱之津液血之所化也故尿之通塞必徵之於氣血之流動昧者不達此理孟浪貪效妄施攻擊不止害胃氣速其死更急若誤補之水毒愈郁經脈愈閉胸脅脹滿心煩嘔逆助上奔之勢蹙命期古人以為壅疾雖補瀉殊途其害性命者則同焉難經有虛虛實實之戒亦以此爾故漫用補瀉不至殺人者雖有寡焉千金方說補瀉甚簡聖惠方敷演為說頗為精確録備參考曰夫腳氣病者雖虛羸不可多服補藥補藥令人心腹脹氣實便死非瀉不瘥又不可見虛而不瀉也見氣實而死者甚衆十中無一人服藥致虛而殂者縱甚羸亦須微微通泄亦宜時取汗也其有太虛者微用補藥助之食戒人之所以生因飲食滋養身體以餌為主然此病禁粱肉滋味不可不最嚴也其故何也膏粱者其性油膩平時多吃猶膠滯血液沮其宣布況其嬰病藥力難達斃命必矣病者能守禁忌斷乎無有不效之藥嚴斷膏滋淡泊攝養古來以為良策其可吃者不過紅豆碎麥平淡滲通之品患者犯戒責效於草根樹皮則非也凡人好良膏滋不能中土為之分布腸胃阜敦身體肉脹是以豪家多病而蓽門少患王公貴人身無操作之勞體有暖飽之佚不唯蓽屋之宴安更擁衽席之翠珠頤養過厚體力軟脆以故患腳氣水腫者十居七八藜藿之家則吃蔬取勞以堅筋骨以運氣血病之難犯不外於此也東坡蔬食三益之說有云寬胃以養氣病家能曉此理省膏滋而服藥石何憂其不瘳此不特療腳氣戒之乎平生則攝生保壽必可期矣外因外因得之於侵雨涉水或坐臥濕地或勞勩中風或飢飽不時若大兵之後若凶慊之時蓋系壅塞表氣凝滯氣血之所致也靈樞曰虛邪不能獨傷人必因身形之虛而客之正謂之也蓋氣血者如車輪邪或乘之心者血之主肺者氣之主氣主噓之血主濡之灌溉筋脈升降有常自然運行今邪犯肌肉是以水血否澀而鬱蓄成毒內則浸漬藏府外則流溢皮膚古謂之緩風又謂之濕痹謂之腳氣其狀貌有麻痹不仁者有攣筋疼痛者有心腹脹急者有寒熱煩渴者有小便短少者有驚悸迷亂者有足脛浮腫者其末路遂並歸於衝心然較之乎由內者其勢稍緩治法皆取之於發泄表氣運動水血之劑風濕血痹雖稍異其因至其情機則同焉是所以須桂麻朮附之品也史載腳腫今拈出證由外因者梁武帝大通三年侯景圍建康閉城之日男女十餘萬擐甲者二萬人被圍既久人多身腫氣急死者什八九隋煬帝大業元年劉方徵林邑士卒腫足死者什四五後梁紀會陰雨積旬黃澤道險堇泥深尺余士卒援藤葛而進皆腹疾足腫死者什二三醫宗金鑑載青腿牙疳門北路隨營醫官陶起麟言其治法內地人初居邊外得此症十居八九蓋中國人不耐邊外嚴寒更坐臥濕地致腿青腫內體頑硬步履艱難又緣缺少五穀多食牛羊等肉胃火上熏致下疳按如此症古所未聞思亦後世因地氣寒濕發此種毒因想方今江戶士人多充北營恐亦嬰此患庶幾令其土醫人預慮治方烏頭湯金匱治腳氣疼痛不可屈伸麻黃甘草川烏黃耆芍藥右五味內蜜煎中更煎之案此方用之於外因腳氣閉塞表氣者治關節疼痛肌肉頑痹君以麻黃通表氣開痹著臣以芍藥緩和筋絡黃耆逐水固表助以烏頭雄烈驅寒燥濕且甘蜜之和潤可濡血養液五味相合其勢翕翕行於肌肉關節之間如此而外之凝滯者行內之冷結者去是長沙化工之妙手麻黃加朮湯金匱濕家身煩疼發其汗為宜麻黃杏仁桂枝甘草術上五味案此方表氣壅滯血凝氣陰不快於運行故麻桂以達表杏術以逐水綢繆失治必變浮腫至壅滯較深者則可用麻黃杏仁薏苡甘草湯桂枝芍藥知母湯金匱諸肢節疼痛身體尫羸腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥甘草麻黃生薑知母術防風附子右九味案此方治歷節之劑今用之腳氣能治痛痹轉筋不仁蓋人之氣血得溫則流動遇寒則凝沍淫溢於肌肉攔陰表氣是以桂麻防風之辛燥開表行氣知芍戮力調和血液於其間加附子走濕邪於經隧中助桂麻為驅逐術能祛表裡之水姜以其辛溫使諸藥宜行也名護屋丹水曰今腳氣痛風及鶴膝風舍之用獨活寄生湯當歸拈痛湯劑其效力甚鈍誰知之用之耶嗚呼當時醫道未闢丹水發此言可謂卓識矣六物附子湯三因方寒濕腳氣疼痛不仁兩尺脈來沉細者附子桂枝防己術茯苓甘草右六味案此方即仲景甘草附子湯加防己茯苓者孫氏四物附子湯方後云體腫者加防己悸氣小便不利者加茯苓七味附子湯方後云濕痹緩風身體疼痛欲折肉如錐刺濕緩異名其為腳氣則一也陳氏概謂之痹症蠲痹湯楊氏家藏方治風濕相搏身體煩疼項臂痛重舉動艱難及手足冷痹腰腿沉重筋脈無力當歸羌活薑黃芍藥黃耆防風甘草右七味入薑棗案此方治痛痹之套法也歸黃能入血分和經遂羌防耆姜逐水氣斂肌表芍甘緩筋絡利關節衆味湊合通暢血氣羈持經絡或加附子薏苡其力更捷礬石湯金匱治腳氣衝心案此方泄腳之法也以其出金匱姑附於斯然非仲景原方千金論腳氣云魏周之代無此疾出後世可以證矣腳氣涉日者間有效屬衝心者實非此方所及也內因此病近世所行者係一種水毒其毒酷厲峻烈淫血脈則為麻痹痿弱溢水道則為尿少浮腫下注則膝腳不仁上奔則衝心悶絶與淡飲之水迥然不同如淡飲其氣滲淡縱為腐敗不過胸痛嘈雜噁心嘔吐心痛腹滿下利憒憒悶悶等症至死亡者斷無而僅有焉水毒則甚峻請詳論之蓋升平日久人人遊惰奉身飽暖處形安逸加之膏腴過分房闈越節自耗其元氣元氣已耗則脾胃不健氣血不行因釀一種之水毒焉抑情欲成病居多豈止腳氣不可下猛戒也男子春心未動女子情竇未開並不睹髮腳氣老人還童欲念既斷者亦復然則可以證其由內因者而其證屬重亦可徵焉蓋其水從腸胃直趨膜外內而臟腑外而經絡凡衝脈所行之地無處不到駸駸乎將迫心藏心藏為之沸戾激拒發見於胸間謂之心跳至其劇毒氣貫心悶絶即斃謂之衝心近日所見愈多愈重可知天下之病隨時隨地變化無窮乃自非照氣化之厚薄察時世之體性而知病不必出於天人人自招之何以治之墨守古人之成法治今之腳氣所謂膠柱刻舟不能為用也要之須先知古人立方之意而處變妄自處方亦我所不取也木防己湯金匱膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與不愈者木防己去石膏加茯苓芒硝湯木防己石膏桂枝人參右四味案水毒奔騰於上呼吸息迫胸膈滿悶心下石硬煩渴喘急動氣如瀾是為衝心之兆須用此急救矣防桂並能行水散結石膏清熱人參滋液其虛者外雖痞堅內無結聚水去氣行而愈其實者復聚仍依前方減石膏加芒硝之鹹寒峻開鬱寒以茯苓之滲利直輸之水道未有不愈者籲配合之妙非後世所及也吳茱萸湯傷寒論食谷欲嘔者吐利手足厥冷煩躁欲死者嘔而胸滿者乾嘔吐涎沫頭痛者吳茱萸人參大棗生薑右四味按腳氣嘔吐率屬危險不可輕視其變起於不虞檢之於古經長沙治嘔吐之方不過十四方其中雖有兼寒兼熱夾食夾蛔數症大要不出於驅逐水飲之劑當水毒衝心之時無有抗其勢者獨此方直入奏功嗚呼偉矣然須察勢之劇易症之慢緊而審可為之機且勿擬定一方十棗湯傷寒論千金同外臺聖濟宣明論丹溪心法分量互有異同芫花甘遂大戟右三味為散煮大棗去滓內藥末服之案此方利水飲之猛劑深師所謂朱雀湯是也腳氣上入胸痛煩悶喘息自汗氣欲斷非此方不能抵當其勢如逡巡失治則禍在反掌不可嫌其峻坐待斃也概施攻擊之法無不危矣醫者不察於此急於獲效病者喜利藥求通快不知暫時取快真氣愈傷去死不遠也亦不哀哉但其機可以言傳非筆之所及臨處之際須仔細甄別尤審之徐彬曰甘遂性苦寒能瀉經隧水濕而性更迅速大戟性苦辛寒能瀉臟腑之水濕而為控涎之主芫花性苦溫能破水飲窠囊故曰破癖須用芫花合大棗者大戟得棗即不損脾也三花神佑丸宜明論治一切水濕腫滿甘遂大戟蕪花各半兩牽牛二兩大黃一兩輕粉一錢右六味為丸溫水下至快利病去為度按儒門事親載神佑丸無輕粉玉機微義作宜明三花神佑丸此方當以劉氏為祖蓋此方及舟車丸皆自十棗湯而變化之者越婢加朮湯金匱里水者一身面目黃腫其脈沉小便不利里水主之麻黃石膏大棗甘草生薑術右六味按微寒熱舌上有苔而渴小便不利腳弱腫滿是此方之正候也又案金匱里水越婢湯主之外臺引古今録驗作皮水於義似穩然如皮水當以甘草麻黃湯為正對蓋人身之於血氣莫所不貫通環會固不可論表裡內外也蓋麻石同隊則行水驅飲其力稍勝麻杏甘石湯越婢加半夏湯厚朴麻黃湯小青龍湯雖各有所主至其逐水之功則同矣要在臨病之際隨其淺深而斟酌之耳又案千金腳氣門所載越婢加朮湯加附子外臺亦同蓋從胡洽方也此方加附子其功更峻用流走之性逐周身之水猶川有堤防水由地中行矣為醫者玩索方意運用得宜亦如禹之行水聖惠方麻黃散治風水遍身腫滿骨節痠疼惡風腳弱皮膚不仁即本方加甘草防己桑根小半夏湯外臺文仲療腳氣入心悶絶欲死半夏生薑上二味愚常用此湯吐仍不止者加鐵砂屢取功趙以德曰半夏之味辛其性燥辛可散結燥可勝濕用生薑以利其悍孫真人云生薑嘔家之聖藥嘔為氣逆不散故用生薑散之房侍中療苦腳氣攻心此方甚散腫氣極驗外臺大檳榔生薑橘皮吳朱萸紫蘇木瓜上六味案此方為治腳氣正對之方驅逐水毒渙散鬱塞檳榔能分泌水血導之尿道木瓜能滲入血液收斂汗濁茱萸溫中降氣蘇橘芬香行氣衆味合力為功實為溫利水毒之良方推其立方之意則亦足以知腳氣所起之理散腫氣極驗五字方中骨子豈可不深味乎案此方後人增減頗多今牽聊録之下方蘇恭尋常氣滿三日兩日服一劑湯於本方去紫蘇木瓜加厚朴又蘇恭腫滿小便少者紫蘇湯於本方去吳茱萸木瓜加甘草又許仁則曰但覺腳腫疼悶沉重有時緩弱乍衝心腹滿悶小腹下不仁有時急痛吳茱萸湯於本方去木瓜加桂心聖惠治腳氣心腹脹滿煩悶喘息檳榔散於本方去吳茱加豬苓桑根白皮朱氏集驗加桔梗名雞鳴散治腳氣第一隻藥不問男女皆可服文仲腳氣冷毒悶心下堅背膊痛上氣欲死者外臺吳茱萸檳榔木香犀角半夏生薑上六味案此證有瘀血與水毒相結聚心下迫背膊故方中伍犀角方下云冷毒方後云破毒氣尤良立方之意可推知矣廣濟療腳氣急上衝心悶欲死者方外臺檳榔子生薑童子小便上三味攪頓服須臾即氣退案人尿性溫味鹹又主收斂降逆氣傷寒論用之於下利不止厥逆無脈者褚氏遺書用諸咳血殺人之症茱萸湯蘇長史方千金治腳氣入腹困悶欲死腹脹方吳茱萸木瓜上二味進一服或吐或汗或大熱悶即差此起死人方按至脾氣衝心無藥可療只此二味較之諸湯其效尤峻足以奏功乎燃眉之際千金贊之云此起死回生之方也殆不誣矣外臺毒氣攻心手足脈絶此亦難濟不得已作此湯十愈七八於本方加青木香犀角聖惠治腳氣衝心悶亂不識人手足脈欲絶於本方加檳榔生薑三因茱萸丸等分為末酒糊丸即本方崔氏療腳氣遍身腫方外臺大豆桑根白皮檳榔茯苓上四味案此方滲利之良劑治遍身洪腫煩悸殊甚者愚每以水四合先煮黑豆二兩減二合內諸藥及郁李去殼一錢取一合日三劑今加郁李仁據聖濟犀角旋覆花湯千金腳氣之病先起嶺南稍來江東得之無漸或微覺疼痹或兩脛腫滿或行起澀弱或上入腹不仁或時冷熱小便祕澀喘息氣衝喉氣急欲死食嘔不下氣上逆者犀角旋覆花橘皮茯苓生薑大棗香豉紫蘇莖葉上八味服之以氣下小便利為度崔氏名小犀角湯如其不下服後大犀角湯即本方加白朮桂心防己黃芩前胡桑白皮降氣湯元和紀用經定上氣息鳴卒喘便欲絶者入口氣下萬金不傳吳茱萸桑白皮上㕮咀分四處每一以水二升酒一升煮三沸取清汁作三服立驗每煮成入生薑汁一匙匕煮一沸為準自神龍致仕孟伊陽傳云用無不效案醫心方引葛氏方生薑同煮不用汁並無方名又萬安方引可用方降氣湯治氣虛喘促及大病後虛喘於本方加五味子蓋降氣之名以元和紀用為藍本和田泰純於此方中加犀角茯苓名豁胸湯專治腳氣上衝欲死者又合之於沉香降氣湯治心下急迫尤甚者曾聞泰純長於診候決死生於一視蓋踵事刓精之所得也然如其藥方率屬浮泛難以為準獨此方不失古意其力最峻可以奏功於切迫之際紫蘇子湯千金方治腳弱上氣昔宋湘東王在南州患腳氣困篤服此湯大得力紫蘇子半夏前胡厚朴甘草當歸橘皮大棗生薑桂心上十味案腳氣痰喘上氣者宜此方方下云困篤服此湯今試之此方不能敵因篤古人之言不可悉信也局方易簡方名之曰蘇子降氣湯沉香降氣湯局方患腳氣人毒氣上衝心腸堅滿肢體浮腫者尤宜服之沉香香附子甘草縮砂上四味鹽少許沸湯點服案此劑皆辛溫解鬱開壅下氣散滯故能治腳氣迫於心胸者蓋此三方其旨趣相均緩急稍異要在臨床之際隨其劇易處置之耳小柴胡湯傷寒論治腳氣胸脅痞塞寒熱如瘧者柴胡黃芩半夏大棗人參甘草生薑上七味按本方加常山更覺有驗千金常山甘草湯可並攻杉木湯證類本草本事方今據蘭臺軌範唐柳柳州云元和十二年二月得腳氣夜半痞絶脅有塊大如石且死困塞不知人三日榮陽鄭洵美杉木湯服半日食頃大小便三次氣通塊散杉木節一大升橘葉一升無葉以皮代之大腹檳榔七個合子碎之童子小便三大升共煮一升半分二服若一服得快利停後服案此煎法不明恐有脫字愚以意酌量吳昆曰杉木節質重而氣芳質重則能達下氣芳則能疏壅橘皮味苦而厚過於青皮檳榔質實而重等於鐵石味厚則泄質重則降故能令邪氣大下童便鹹寒物也咸則能引邪氣以走濁陰寒則能平熱氣使不上逆活人書檳榔散即此方變方余嘗驗杉木肉色紅者為油杉堪用白色者無效風引湯金匱巢氏云腳氣宜風引湯大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂紫石英石膏各六兩上十二味杵粗篩以韋囊盛之取三指撮井花水三升煮三沸溫服一升徐靈胎曰此乃臟腑之熱非草木之品所能散故以金石重藥清其里靈砂局方治上盛下虛痰涎壅盛最能鎮墜升降陰陽和五臟助元氣水銀一升硫黃四兩上二味用新鐵銚炒成砂子或有煙焰即以醋灑候研細入水火鼎醋調赤石脂封口鐵線扎縛煞干鹽泥固濟用炭二十斤煆如鼎子烈筆醮赤石臘頻抹其處火盡為度經宿取出研為細末糊為丸如麻子大每服三丸空心棗湯米飲井花水人參湯任下量病輕重增於五七丸案此鎮墜之要藥腳氣嘔吐或上衝或動氣甚者皆用之有殊驗東坡有靈砂說文繁不録宜閲附凡嘔吐不納藥者最難救療藥入即吐安能見功胃口愈逆愈翻萬難處分記安政戊午自夏涉秋暴瀉流行其症洞瀉傾盆須臾發嘔吐上翻下出急者一二時緩者一二日脈絶即斃時師以其不納種種怪藥強灌之而一吐傾囊束手俟死愚偶閲幼幼集成載靈砂止嘔治驗因試之多得功其法仿局方丸靈砂如梧子大初服三丸次服五丸久之服十丸冷水送下胃口已安候不復吐始用對症之藥脫人於困卮不少真扶危濟死之神丹也紫雪崔氏療腳氣毒遍內外煩熱口中生瘡者方活人書曰大煩躁者紫雪最良案千金翼與外臺分量不同局方全據千金異蘭臺軌範減二消用十分之一黃金百兩以飛金一萬頁代之吾師家據外臺擬定劑量精核的當屢得偉功因録告後學黃金煮汁六合寒水石石膏滑石磁石各六錢六分三釐五毛四絲上五味以水一升五合煮取六合玄參升麻各二錢二分一釐一毛八絲羚羊角犀角沉香木香各六分九釐一毛二絲丁子一錢三分八釐二毛四絲甘草一錢一分五毛九絲上八味八錢四分三釐四毛八絲以前煮汁合一升二合煮取四合五勺入消石一合二芍芒消二錢一分一釐八毛四絲上煎欲凝入硃砂四分六釐八絲麝香一分七釐二毛八絲攪調令勻磁器收藏藥成霜雪紫色水調下外臺又曰服紫雪強人一服二分弱者一服一分和水服當利熱毒按此方藥品太雜似無法度用之傷寒中風驚癇腳氣等其功殆不可言蓋除祛熱毒鼓蕩神氣要清涼之劑非此方不能達大症信醫家必備之藥也養正丹局方療元氣虛虧陰邪交蕩正氣乖常上盛下虛氣不升降呼吸不足頭旋氣短及中風涎潮不省人事陽氣欲脫水銀硫黃研細硃砂研細黑錫去滓枰與水銀結沙各一兩上用黑盞一隻火上熔黑鉛成汁次下水銀以柳杖子攪勻次下硃砂攪令不見星子放下少時方入硫黃末急攪成汁和勻如有焰以醋灑之候冷取出研如粉極細用糯米粉煮糊為丸如緑豆大每服二十粒加至三十粒鹽湯下此藥升降陰陽既濟心腎空心食前棗湯送下神效不可具述易簡方曰腳氣之患入腹衝心或見嘔吐之證無法可療千金以大黃利之大黃性寒病既深入必難導達是速其嘔吐也不若用養生丹或黑錫丹來復丹之類煎降氣湯咽下更須多服以大便通利為度腳氣無補法此有利性即非補藥服之無疑案腳氣頑痹不仁緩縱不隨行動難澀轉筋屈倒是其常態不足大畏但膻中動劇者大可畏須決意救療之不論乾溼胸脅逆滿氣上急迫者其變起於不測寬者猶延日但動氣奔騰毒氣迫心氣喘不停自汗數出其脈短促沉伏嘔吐不止者皆屬死候方此之時非草根木皮可衡抗非金石猛厲咄嗟之間何能奏凱不可憚其峻束手待斃也並病腳氣與諸病相併者傷寒痢後瘧後産後往往發之蓋五內未調氣血不健而生一種水氣者是也宜照合前款審病之淺深緩急而為之處療此編所舉者蓋緩治之策也然忽之則命亦忽諸溺之之責我得辭哉崔氏八味丸金匱治腳氣上入少腹不仁地黃山茱萸薯蕷澤瀉茯苓桂枝牡丹皮附子上八味案蓋此方據蘇長史腳氣因於腎虛之說則當編之於內因中然功力迂慢非猛制水毒之劑仍收入於茲又案此方和血滲濕之劑加以附子之健悍行地黃之濡滯使頽惰之氣斡旋於經墜之中施之於諸病後少腹頑痹腰脛委弱帶腫氣淹留彌日者每見殊效如腳氣上入毒氣撞心恐非此萬所對也又案此方仲景所制而治腳氣上入者出於崔氏所傳故標以崔氏崔氏名知悌著纂要方十卷見舊唐書經籍志吳昆方考載漢武帝病渴仲景為處此方進之無稽之談不足信又王海藏醫壘元戎引易老云八味丸益火之源以消陰翳壯水之主以制陽光此語原繫於王大僕素問注語薛己專取此語附會八味六味二丸為補腎益精之說遂開誨淫誘欲之路此藥元無壯陽之效且非所制之本意甚矣其為惑也又按嚴氏於本方中加牛膝車前子名加味腎氣丸治腎虛腰重腳腫小便不利又張璐玉本方加沉香治腳膝枯瘦色淡小腹不仁腹急疼痛上氣喘急千金一方治腳氣氣血凝滯者大黃木香生薑檳榔枳實橘皮甘草上七味案此方原千金方山脅氏加桂枝紫蘇治腳氣兼痞積者尤有驗蘇恭防己湯外臺主通身體滿小便澀上氣上下痰水不能食食則脹者桑白皮大豆防己橘皮茯苓麻黃生薑旋覆花杏仁紫蘇莖葉上十味小便利腫氣消下冷多加茱萸熱多加玄參烏苓通氣湯萬病回春烏藥當歸芍藥香附糖球陳皮茯苓白朮檳榔玄胡澤瀉木香甘草生薑上十四味惡寒加吳茱萸案此方疝家患腳氣腰腳麻痹或下部帶腫氣者殊有功三和散局方治腳氣上攻胸腹滿悶大便不通大腹皮紫蘇獨活沉香木瓜川芎白朮木香甘草檳榔橘皮上十一味案此方原出於傳家祕寶名大三脘散治三焦氣逆解大便祕滯下胸脅滿脹沉陳蘇檳開滯破郁川芎散血滯獨活逐水濕木瓜利筋絡術甘調和脾胃夫氣血壅滯則筋脈不利三焦不和則運輸不健一用此湯鬱滯開而三焦通所以有三和之名也澤漆湯聖濟治痢後腫滿氣急喘嗽小便如血澤漆葉桑根白皮郁李仁杏仁人參白朮陳橘皮上七味案本草澤漆味苦微寒主大腹水氣四肢面目浮腫凡精氣衰憊峻猛之劑恐不能堪故不得不取之於滲利實脾散本事方治陰水木香果仁大腹子附子茯苓乾薑甘草上七味案嚴氏濟生方所載實脾散治水腫比此方多厚朴白朮茯苓木瓜蓋嚴氏原於本事加四味醫學綱目實脾散同本事嚴氏一時太醫後世以為實脾之祖者謬導水茯苓湯治水腫遍身如爛瓜喘滿倚息不能轉側茯苓麥門冬澤瀉白朮紫蘇檳榔桑白皮木瓜陳皮砂仁木香燈草大腹皮上十三味愚每用之於水腫腳氣混淆者加郁李仁更效然未詳出於何書姑據方賢奇效良方並録於此證治準繩醫宗必讀醫燈續焰畢載此方稱其功主腳氣大便澀方千金月令大黃五兩大麻三兩上二味羅大黃為末和麻仁以蜜為丸紅豆煎家方治水腫嚴斷米粟專食菽麥令疏通水毒本林一一烏祕方起廢湯家方腳氣日久腰腳瘦削或攣急或麻痹或骨痿嚲曳一切虛羸用之滋養針砂丸家方治胃虛一身洪腫者余家每用鋼鐵鐵家所磨鑢細末季仲南永類方云腫藥用鐵蛾及針砂入丸子者一生須斷鹽蓋鹽性濡潤腫者再作不可為矣此說信然高蜜丸家方治腫滿絲瓜十匁燒存性巴豆一匁去皮熬研如脂右二味煉蜜丸如梧子大強人初服五分弱者半之此方原出香祖筆記元鮮于伯機記杭醫宗會之者善治水蠱以乾絲瓜一枚去皮剪碎入巴豆黃色為度去巴豆用絲瓜炒陳倉米如絲瓜之多少候米黃色去絲瓜研之為末和清水為丸如桐子大每服百丸皆愈宗言巴豆逐水絲瓜象人脈絡去而不用藉其氣以引之也豫試之洞瀉如傾用之於水腫膨脹間覺有效但腳氣忌巴豆之說見於後條化毒丸治痿癖不能起者薰陸一匁大黃雞冠雄黃亂髮霜各三匁生生乳一匁右五味糊丸此藥剛烈慎勿過用二三分至四五分服後有發赤疹者有為發熱者皆中肯綮也宜止後服若服後覺瞑眩者宜飲冷水吃冷粥立定友人淺田識此曰此方原出陳司成黴瘡祕録癸字化毒已字化毒之類耳山脅氏拔其精英為五味治諸頑痼沉滯之病案生生乳奇功靈驗不可勝紀然未詳其所始蓋起於天宮瘍醫歟凡療瘍以五毒攻之鄭玄注云五毒者五藥之有毒者今醫方有五毒之藥作之合黃堥置石膽丹砂雄黃礜石磁石其中燒之三日三夜其煙上著以雞羽掃取之以注創惡肉破骨則盡出是乃生生乳之祖陳氏曰如水銀一物得雲母礜石同煉其毒即解不比粉霜輕粉之酷烈也配風藥而治大麻風配癆藥而治傳尸癆配蟲藥而治諸蟲疾配膈藥而治噎塞翻胃配瘡藥而治頑毒頑癬久漏骨痛種種奇效不獨治廣瘡毒氣之聖藥也針灸灸治刺血者非拔本之法然稱濕痹緩風者隨症時用亦可孫真人王燾專用炳灸蓋取之於聳動經脈宣通壅寒如𤸷痹麻木痿癖緩縱拘急轉筋者宜灸其腰腳凡灸而不覺熱者其毒深也乃至覺熱益佳加多無妨待身體輕利然後可休矣楊大受則以砭針出血為第一各有所見如其灸法千金外臺載之甚詳用者當照看原文茲揭其穴名千金灸穴風市伏兔犢鼻膝兩眼在膝頭骨下兩傍陷者宛宛中是三里上廉下廉以上五穴陽明胃經絶骨少陽膽經外臺灸穴風市膝目絶骨陽陵泉陽輔三穴少陽膽經上廉條口下廉犢鼻四穴陽明胃經崑崙委中承筋承山四穴太陽膀胱經大沖復溜湧泉三穴少陰腎經曲泉中都二穴厥陰肝經三陰交陰陵泉二穴太陰脾經少陽維在內踝後一寸動筋中太陰在內踝上八寸骨下陷中太陰蹺在內踝下向宛宛中是余家別有打膿之術施之於三里三陰交及腰腿肉隙骨間釀瘡泄毒凝者散滯者通其功優於灸治屢驗備案一商人患腳氣已歷諸醫又請余氣急喘悶上攻已極氣息奄奄殆無脈告不治而歸家人遮留曰生死命也請貺一劑殘喘尚存何忍束手視死余乃再候之惟面目神光猶似存生機手足既厥線息欲斷與茱萸湯入童便如法告曰服之厥回汗出或得活路不然雖司命亦地奈之何因宿其家屢起診之及曉大汗出大熱悶頃之厥回脈出困悶頗安余喜曰得之矣既而氣漸復神漸旺仍護前方兼養生丹調理五日危候始穩微喘未除因轉方投沉香降氣湯服之旬有五日得奏全績顧幸矣非余之功病家之命數未盡也初當告不治之際豈知有今日哉一婦人娩後十餘日惡露不下心胸滿悶煩渴微嘔前醫以為瘀血用桃核承氣湯下利日三四行瘀血不下小便益短少腳腿壅腫麻木不仁延豫診之心胸堅滿動氣泄衣每動搖自汗息迫豫謂水毒使瘀血不下蓋水毒為之源而瘀血則委也於是作木防己湯與之兼服針砂丸嚴戒鹽味小便通瘀血下經二旬而愈一沽豎年二十三形質肥胖染疫舌上黃褐色其脈弦大譫語潮熱時時蹙頻時時嘔吐按腹若腹痛者用大柴胡加芒硝湯大下之數日續下利裡急後重腸垢雜下二十行至三十行飲啖少進熱勢大減始自告所苦轉芍藥湯諸候向安一日忽息迫不能坐臥膻中動氣如奔馬豫知其變於腳氣急疊用蘇長史吳茱萸湯及甘遂大戟之類不及而斃按此症初而疫邪中變痢終變腳氣固雖屬危險非無可救之術蓋攻伐屢用胃元頓虛遂生水毒然復以駃藥劫之我速其死必矣今而思之不能無赧然於懷一商人年四十餘患腳氣其症足脛麻痹屈弱時不能起按之有微腫脈數而有力膻中無動小便短澀至夜微嘔晝則神色如平投唐侍中一方加旋覆花間三日往診狀貌依然又間三日診之嘔止小便通如報善候者但口鼻氣冷以指候之舌心愈冷意謂呼吸者元氣所通知是水毒伏心神機竭於內之候蓋異症也大怖辭去其家招一醫醫來診曰此腳氣常態口鼻氣冷者胃中有寒飲溫之即愈矣家人大喜曰荷再造之恩服藥一日小便不通嘔吐復發衝心而死一士人上自頭腦面部下至心腹臍下麻痹不仁呼吸逼迫言語蹇澀小便赤少腰腿以下如常時時顛躓不能起家人大駭招一友某某至診不能詳其因簡余議焉余往察之脈緊而有力膻中生動有跳騰之勢謂某曰病候甚似風痹狀然非風也蓋腳氣也某曰何以徵之曰膻中有動呼吸息迫小便赤澀是不水毒難伏於內而逼心肺耶麻痹不仁腰腳屈弱是不水毒淫於外而壅塞表氣耶是病涉表裡者必矣曰何藥處之曰以麻黃加朮湯發泄其表郁可使氣血通暢周行兼以木茱湯收其水而輸之尿道則內外並行無相悖矣經曰清陽出上竅謂呼吸也濁陰出下竅謂二便也蓋體之變異必徵之於此二者呼吸與二便其出入關竅所以為生之要曰善矣乃投所擬不日而痊一士人年強仕職居繁劇初覺腳重短息以鞅掌無暇置而不療腫漸增氣愈急請余診之心下堅滿膻中築築然余曰是腳氣也慊請之遲趁早療之何至此與唐侍中一方兼服禹功丸小便快通諸候殆安一日召同僚會飲犯禁叨餮息迫復發小便閉塞涓滴不泄小腹膨脹苦楚喊叫抬首擷項不能安臥家人吃驚走僕邀余至則呼吸短息時時衝心作大黃甘遂湯一瀹投之庶幾穀道幸開尿道從通頻服前方須臾稀溏數行呼吸平穩衝心稍安然尿道未通技殆窮矣其家相議延蘭醫醫至用導溺管猶不能通一滴無復策可出又召二醫蘭醫曰實芰海蔥疏之漢醫曰附子溫之或曰大黃蕩之議論坌出亂投調停者十餘日全軀洪腫短氣息迫虛里如奔馬自心下至少腹膨脝𪔣然青筋如貫索陰囊斗大陽莖沒其中又會衆醫商議而紛然不決余謂衆曰今水路填塞不泄一滴滲出之水不能入脬泛濫百體為此洪腫猶川瀆壅塞水潰於野勢將里山一旦沖丹府死不旋踵用慢藥坐待斃豈如投駃藥乎或回生於萬一引本經證斑蝥利水之效將用之衆醫猶疑余奮曰孤注視病者有時不得不敢執柯伐柯前賢所驗余亦數試用縱不利於病必不至裂肝碎腸決策遂投其夜溺初通三夕翌一合五勺於是用木防己加茯苓湯仍兼服斑蝥如是兩三日小便日通一升五合既見建瓴之勢洪腫漸減氣急亦弛尚護前方止斑蝥飲啖少進精氣日旺家族欣然始動喜色自初病起至此凡五十七日病已除十之九矣此役也凡自通利分消之藥至攻擊推搬之品遍用不遺餘力卒無影響然一蟲能建奇勳豈不偉乎姑録告同志使知治法隨時處劑而不可拘於常套但大患重恙變起不測不可不懼而戒也藥者毒也不可輕用蓋養胃莫粱肉若焉攻病莫藥石若焉粱肉猶禮樂也藥石猶攻伐也人有病不得已用藥無病而服之必惹利害崔置政論有云蓋為國之法有似理身平則致養疾則攻焉夫刑罰者治亂之藥石也德教者興平之粱肉也以德教除殘是以粱肉治疾也以刑罰治平是以藥石供養也近坊富家之子某其質嬌軟年甫十九乃翁太鍾愛焉時屬仲秋某遊郊帶醉散步渴多飲水明日脛生微腫而其所親狎醫某不學無術奉承為業視之曰腳氣腫滿之漸雜藥亂投腹滿微嘔醫駭曰恐為衝心於是家人煌惑招數醫乞治余亦見延診之其脈緩氣息如平膻中無動又無麻痹但腹中有飲按之漉漉然蓋腸間之水耳無腳氣可徵余曰是湯液過飲所致蓋軟脆之質不慣行步煩渴飲水因發微腫今吐水者吉兆胃惡濕欲排泄之耳紅豆粥代藥不出數日應自愈矣翁陽諾陰疑余亦不強而去衆醫日夜環守床褥甲曰宜逐暑邪乙曰宜滲利丙曰宜溫補爭欲效功前藥未行後藥繼至各陳臆說湯液丸散種種怪藥疊進頻服嗟呼軟脆腸胃何堪多藥之毒某遂斃於藥可憐也哉要是出於醫人貪利之不仁而世俗不解藥之為毒之過也富家死於藥往往有焉況王公貴人為臣子者可不鑑戒哉
